<!DOCTYPE html>
<html lang="eng">   

<title>Patient Registration form</title>

</head>
<h1> Patient Registration form(Admission) </h1>
</head>

<form>

    <label for ="PatientName">Patient Name: </label>
    <input type="text" id = "PatientName" name = "PatientName" placeholder ="Enter the name">
    <br><br>

    <label for = "Age">Age: </label>
    <input type = "number" if = "Age" name = "Age">
    <br><br>

    <label for = "DOB"> date of birth: </label>
    <input type ="date" id ="DOB" name ="PatientDOB">
    <br><br>

    <label for ="Gender">Select Gender:</label>
    <br><br>

    <input type="radio" id ="GenderMale" name="Gender" value="Male">
    <label for ="GenderMale">Male</label>
  
    <br><br>
    <input type="radio" id ="GenderFemale" name="Gender" value="Female">
    <label for ="GenderFemale">Female</label>

    <br><br>
    <label for ="Address" >Patient Address:</label>
    <textarea id="Address" name="PatientAddress" rows="4" cols="20" placeholder="Enter Address"></textarea>

    <br><br>

    <label for="InsertFile">Patient Previous Medical Doccument: </label>
    <input type ="file" id = "file" name="file">

    <br><br>

    <label for="Doctor">Prefered Doctor department:</label>
    <select>
        <option value="Default"></option>
        <option value="Skin">Skin department</option>
        <option value="Medicine">Medicine department</option>
    </select>
    <br><br>

    <input type="submit" id="submit" name="submit">
    <input type="button" id="reset" name="reset" value="Reset">



</form>

</html>
